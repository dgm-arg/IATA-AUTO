<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test 7: Tablas Spec + codigos (DOM real)</title>
  <style>
    body { font-family: monospace; font-size: 13px; padding: 20px; background: #f5f5f5; }
    #summary { position: sticky; top: 0; background: #222; color: #fff; padding: 12px 20px; font-size: 15px; z-index: 10; border-radius: 6px; margin-bottom: 8px; }
    #filters { margin-bottom: 12px; display: flex; gap: 8px; }
    #filters button { padding: 4px 12px; cursor: pointer; border: 1px solid #999; border-radius: 4px; background: #fff; font-family: monospace; }
    #filters button.active { background: #333; color: #fff; }
    .pass { color: #2e7d32; }
    .fail { color: #c62828; font-weight: bold; }
    .skip { color: #ef6c00; }
    .line { display: block; }
    .line.hidden { display: none; }
    pre { background: #fff; padding: 16px; border-radius: 6px; white-space: pre-wrap; }
    iframe { width: 100%; height: 400px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 12px; }
  </style>
</head>
<body>
<div id="summary">Cargando iframe...</div>
<div id="filters">
  <button class="active" data-f="all">All</button>
  <button data-f="pass">Pass</button>
  <button data-f="fail">Fail</button>
  <button data-f="skip">Skip</button>
</div>
<iframe id="app" src="index.html"></iframe>
<pre id="log"></pre>
<script>
const logEl = document.getElementById('log')
const summaryEl = document.getElementById('summary')
let pass = 0, fail = 0, skip = 0

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('button')
  if (!btn) return
  document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  const f = btn.dataset.f
  logEl.querySelectorAll('.line').forEach(el => {
    el.classList.toggle('hidden', f !== 'all' && !el.classList.contains(f))
  })
})

function log(msg, cls) {
  const span = document.createElement('span')
  span.className = 'line ' + (cls || '')
  span.textContent = msg + '\n'
  logEl.appendChild(span)
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)) }
function getDoc() { return document.getElementById('app').contentDocument }

async function waitForEl(fn, timeout = 10000) {
  const s = Date.now()
  while (Date.now() - s < timeout) { const el = fn(); if (el) return el; await wait(50) }
  return null
}

async function search(onu) {
  const doc = getDoc()
  doc.getElementById('results').innerHTML = ''
  doc.getElementById('embalaje-detail').innerHTML = ''
  doc.getElementById('numInput').value = onu
  doc.getElementById('searchBtn').click()
  await waitForEl(() => doc.querySelector('#results tbody tr') || doc.querySelector('#results p'))
}

async function clickRow(idx) {
  const doc = getDoc()
  doc.getElementById('embalaje-detail').innerHTML = ''
  const rows = doc.querySelectorAll('#results tbody tr')
  if (idx >= rows.length) return false
  rows[idx].querySelector('td').click()
  await waitForEl(() => doc.querySelector('#embalaje-detail .card') || doc.querySelector('#embalaje-detail p'))
  await wait(100)
  return true
}

function findCard(pi) {
  for (const card of getDoc().querySelectorAll('#embalaje-detail .card')) {
    const s = card.querySelector('h6 strong')
    if (s && s.textContent.trim() === String(pi)) return card
  }
  return null
}

async function run() {
  await new Promise(r => { document.getElementById('app').onload = r })
  await wait(500)
  summaryEl.textContent = 'Cargando datos...'

  const [tablaOnu, tablaClaude, codigosPIRaw] = await Promise.all([
    fetch('tabla_onu.json').then(r => r.json()),
    fetch('embalajes_tabla_claude.json').then(r => r.json()),
    fetch('codigos_tablas-PI.json').then(r => r.json()),
  ])

  const tcMap = Object.fromEntries(
    tablaClaude.instrucciones_embalaje.map(e => [String(e.codigo), e])
  )
  const codigosPI = {}
  for (const items of Object.values(codigosPIRaw.embalajes_ONU)) {
    for (const item of items) codigosPI[item.codigo] = item.descripcion
  }

  const byOnu = {}
  for (const row of tablaOnu) {
    const onu = String(row.onu)
    if (!byOnu[onu]) byOnu[onu] = []
    byOnu[onu].push(row)
  }

  const piTests = {}
  for (const [onu, rows] of Object.entries(byOnu)) {
    for (let ri = 0; ri < rows.length; ri++) {
      for (const col of ['APCCL-embalaje', 'APC-embalaje', 'AC-embalaje']) {
        const v = String(rows[ri][col] || '')
        if (v && !['Prohibido', 'nan', '—', ''].includes(v) && !piTests[v]) {
          piTests[v] = { onu, rowIndex: ri }
        }
      }
    }
  }

  const piCodes = Object.keys(piTests).sort()
  log(`Total PIs a testear: ${piCodes.length}\n`)
  let lastOnu = null

  for (let i = 0; i < piCodes.length; i++) {
    const pi = piCodes[i]
    const { onu, rowIndex } = piTests[pi]
    summaryEl.textContent = `${i + 1}/${piCodes.length} — PI ${pi} ONU ${onu}`

    const tcEntry = tcMap[pi]
    if (!tcEntry || !tcEntry.tablas || tcEntry.tablas.length === 0) {
      log(`[SKIP] PI ${pi}: sin tablas en embalajes_tabla_claude.json`, 'skip'); skip++; continue
    }

    // Build expected lines from JSON (same logic as app.js renderTablas)
    const expectedLines = []
    let hasSpec = false
    for (const tabla of tcEntry.tablas) {
      const specRow = tabla.filas.find(f => f.Tipo === 'Spec.')
      if (!specRow) continue
      hasSpec = true

      const rawValues = tabla.encabezados
        .filter(h => h !== 'Tipo')
        .map(h => specRow[h])
        .filter(v => v && v !== '—')

      for (const val of rawValues) {
        const tokens = val.split(/\s+/)
        const isCode = tokens.every(t => /^\d/.test(t))
        if (isCode) {
          for (const c of tokens) {
            const desc = codigosPI[c]
            expectedLines.push(desc ? `${c}: ${desc}` : c)
          }
        } else {
          expectedLines.push(val)
        }
      }
    }

    if (!hasSpec || expectedLines.length === 0) {
      log(`[SKIP] PI ${pi}: sin fila Spec o sin valores`, 'skip'); skip++; continue
    }

    // Now load the real app and check DOM
    if (onu !== lastOnu) { await search(onu); lastOnu = onu }
    const ok = await clickRow(rowIndex)
    if (!ok) { log(`[SKIP] PI ${pi}: fila no existe`, 'skip'); skip++; continue }

    const card = findCard(pi)
    if (!card) { log(`[SKIP] PI ${pi}: card no encontrada`, 'skip'); skip++; continue }

    const cardText = card.textContent
    const cardHtml = card.innerHTML

    let piPass = true
    const errors = []
    for (const line of expectedLines) {
      if (!cardText.includes(line) && !cardHtml.includes(line)) {
        errors.push(line)
        piPass = false
      }
    }

    if (piPass) {
      log(`[PASS] PI ${pi}: ${expectedLines.length} lineas verificadas en DOM`, 'pass'); pass++
    } else {
      log(`[FAIL] PI ${pi}: ${errors.length} lineas FALTAN en DOM:`, 'fail')
      for (const e of errors) log(`         "${e}"`, 'fail')
      fail++
    }
  }

  summaryEl.innerHTML = `TEST 7 TABLAS SPEC (DOM) | ${pass+fail} tests | <span class="pass">${pass} PASS</span> | <span class="fail">${fail} FAIL</span> | <span class="skip">${skip} SKIP</span>`
}

run().catch(e => log('ERROR: ' + e.message, 'fail'))
</script>
</body>
</html>
